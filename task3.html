<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Service Feedback Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="header">
        <h2>Customer Service<br>Feedback Form</h2>
        <div class="logo">
            CONNECT<br>SPHERE
        </div>
    </div>

    <div class="form-box">
        <form>

            <label>Name</label>
            <input type="text">

            <div class="row">
                <div>
                    <label>Phone</label>
                    <input type="text">
                </div>
                <div>
                    <label>Email Address</label>
                    <input type="email">
                </div>
            </div>

            <p class="note">
                Please rate each question on a scale of 1 to 5,
                with 5 being the highest (excellent) and 1 the lowest (poor).
            </p>

            <label>How satisfied are you with the support you received?</label>
            <div class="rating">
                <input type="radio" name="q1">5
                <input type="radio" name="q1">4
                <input type="radio" name="q1">3
                <input type="radio" name="q1">2
                <input type="radio" name="q1">1
            </div>

            <label>How would you rate the promptness of our response?</label>
            <div class="rating">
                <input type="radio" name="q2">5
                <input type="radio" name="q2">4
                <input type="radio" name="q2">3
                <input type="radio" name="q2">2
                <input type="radio" name="q2">1
            </div>

            <label>How would you rate the professionalism of our team?</label>
            <div class="rating">
                <input type="radio" name="q3">5
                <input type="radio" name="q3">4
                <input type="radio" name="q3">3
                <input type="radio" name="q3">2
                <input type="radio" name="q3">1
            </div>

            <label>How would you rate our ability to meet your expectations?</label>
            <div class="rating">
                <input type="radio" name="q4">5
                <input type="radio" name="q4">4
                <input type="radio" name="q4">3
                <input type="radio" name="q4">2
                <input type="radio" name="q4">1
            </div>

            <label>How would you rate your overall experience?</label>
            <div class="rating">
                <input type="radio" name="q5">5
                <input type="radio" name="q5">4
                <input type="radio" name="q5">3
                <input type="radio" name="q5">2
                <input type="radio" name="q5">1
            </div>

            <label>Additional feedback or suggestions</label>
            <textarea></textarea>

            <button type="submit">Submit</button>

        </form>
    </div>
</div>

</body>
</html>
